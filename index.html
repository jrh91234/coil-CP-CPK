<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Dashboard - Cp/Cpk Management</title>
    
    <!-- ดึง Tailwind CSS และ Chart.js มาใช้งาน -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- แก้ไขพาธชี้ไปที่โฟลเดอร์ css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                SPC & Cp/Cpk Dashboard
            </h1>
            <div class="text-sm">สถานะเชื่อมต่อ: <span id="connection-status" class="text-yellow-400 font-semibold">กำลังโหลด...</span></div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-4 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow">
        
        <!-- ส่วนกรอกข้อมูล -->
        <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit">
            <h2 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">บันทึกข้อมูลการวัด (Data Entry)</h2>
            <form id="data-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">กระบวนการ (Process)</label>
                    <select id="machine-id" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        <option value="Winding-01">Winding Coil MC-01</option>
                        <option value="Winding-02">Winding Coil MC-02</option>
                        <option value="Winding-03">Winding Coil MC-03</option>
                        <option value="Winding-04">Winding Coil MC-04</option>
                        <option value="Winding-05">Winding Coil MC-05</option>
                        <option value="Winding-06">Winding Coil MC-06</option>
                        <option value="Winding-07">Winding Coil MC-07</option>
                        <option value="Winding-08">Winding Coil MC-08</option>
                        <option value="Winding-09">Winding Coil MC-09</option>
                        <option value="Winding-10">Winding Coil MC-010</option>
                        <option value="Winding-11">Winding Coil MC-011</option>
                        <option value="Winding-12">Winding Coil MC-012</option>
                        <option value="Winding-13">Winding Coil MC-013</option>
                        <option value="Winding-14">Winding Coil MC-014</option>
                        <option value="Winding-15">Winding Coil MC-015</option>
                        <option value="Winding-16">Winding Coil MC-016</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">รุ่นชิ้นงาน (Part ID)</label>
                    <select id="part-id" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        <option value="SIB29288-JR">SIB29288-JR [COIL 10A]</option>
                        <option value="SIB71819-JR">SIB71819-JR [COIL 16A]</option>
                        <option value="SIB29292-JR">SIB29292-JR [COIL 20A]</option>
                        <option value="51207080HC-JR">51207080HC-JR [COIL 32A]</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">จุดตรวจสอบ (Parameter)</label>
                    <select id="parameter-id" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">ค่าที่วัดได้ (Measured Value)</label>
                    <input type="number" step="0.001" id="measured-value" placeholder="ระบุตัวเลข..." required class="w-full p-2 border border-gray-300 rounded-lg text-lg focus:ring-blue-500 focus:border-blue-500">
                    <p id="spec-display" class="text-xs text-blue-600 font-semibold mt-1 bg-blue-50 p-2 rounded border border-blue-100"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">พนักงาน (Operator)</label>
                    <input type="text" id="operator" placeholder="รหัสพนักงาน" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg">
                    บันทึกข้อมูล (Save)
                </button>
            </form>
        </div>

        <!-- ส่วน Dashboard -->
        <div class="lg:col-span-2 space-y-6">
            <!-- KPI Cards -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                    <p class="text-sm text-gray-500">จำนวน (n)</p>
                    <p id="kpi-count" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                    <p class="text-sm text-gray-500">ค่าเฉลี่ย (Mean)</p>
                    <p id="kpi-mean" class="text-2xl font-bold text-gray-800">-</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                    <p class="text-sm text-gray-500">Cp</p>
                    <p id="kpi-cp" class="text-2xl font-bold text-blue-600">-</p>
                </div>
                <div id="kpi-cpk-card" class="bg-white p-4 rounded-xl shadow-sm border text-center transition-colors">
                    <p class="text-sm text-gray-500">Cpk</p>
                    <p id="kpi-cpk" class="text-2xl font-bold text-gray-800">-</p>
                </div>
            </div>

            <!-- กราฟ -->
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="text-md font-bold text-gray-700">Trend Chart (Control Chart)</h3>
                    <span id="chart-title" class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded"></span>
                </div>
                <div class="relative h-64 w-full">
                    <canvas id="runChart"></canvas>
                </div>
            </div>

            <!-- ตารางข้อมูล -->
            <div class="bg-white p-4 rounded-xl shadow-sm border overflow-x-auto">
                <h3 class="text-md font-bold text-gray-700 mb-2">ข้อมูลล่าสุด (สำหรับพารามิเตอร์ปัจจุบัน)</h3>
                <table class="min-w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b">
                        <tr>
                            <th class="px-4 py-2">เวลา (Time)</th>
                            <th class="px-4 py-2">เครื่องจักร</th>
                            <th class="px-4 py-2">พนักงาน</th>
                            <th class="px-4 py-2">ค่าที่วัดได้</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- แก้ไขพาธชี้ไปที่โฟลเดอร์ js -->
    <script src="js/script.js"></script>
</body>
</html>
