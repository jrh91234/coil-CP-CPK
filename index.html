<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Dashboard - Cp/Cpk Management</title>
    
    <!-- ดึง Tailwind CSS และ Chart.js มาใช้งาน -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- แก้ไขพาธชี้ไปที่โฟลเดอร์ css -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                </svg>
                SPC & Cp/Cpk Dashboard
            </h1>
            <div class="text-sm">สถานะเชื่อมต่อ: <span id="connection-status" class="text-yellow-400 font-semibold">กำลังโหลด...</span></div>
        </div>
    </nav>

    <main class="container mx-auto p-4 mt-4 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow">
        
        <!-- ส่วนกรอกข้อมูล -->
        <div class="lg:col-span-1 bg-white p-6 rounded-xl shadow-sm border border-gray-200 h-fit sticky top-4">
            <h2 class="text-lg font-bold mb-4 text-gray-700 border-b pb-2">บันทึกข้อมูลการวัด (Data Entry)</h2>
            <form id="data-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">กระบวนการ (Process)</label>
                    <select id="machine-id" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">รุ่นชิ้นงาน (Part ID)</label>
                    <select id="part-id" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">จุดตรวจสอบ (Parameter)</label>
                    <select id="parameter-id" class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">ค่าที่วัดได้ (Measured Value)</label>
                    <input type="number" step="0.001" id="measured-value" placeholder="ระบุตัวเลข..." required class="w-full p-2 border border-gray-300 rounded-lg text-lg focus:ring-blue-500 focus:border-blue-500">
                    <p id="spec-display" class="text-xs text-blue-600 font-semibold mt-1 bg-blue-50 p-2 rounded border border-blue-100"></p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">พนักงาน (Operator)</label>
                    <select id="operator" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        <option value="">-- กำลังโหลดรายชื่อ... --</option>
                    </select>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                    บันทึกข้อมูล (Save)
                </button>
            </form>
            
            <!-- ตารางข้อมูลย้ายมาอยู่ใต้ฟอร์มบันทึก เพื่อประหยัดพื้นที่ให้กราฟ -->
            <div class="mt-6 border-t pt-4 overflow-x-auto">
                <h3 class="text-sm font-bold text-gray-700 mb-2">ประวัติค่าที่วัดได้ (ล่าสุด)</h3>
                <table class="min-w-full text-xs text-left text-gray-500">
                    <thead class="text-gray-700 uppercase bg-gray-50 border-b">
                        <tr>
                            <th class="px-2 py-2">เวลา</th>
                            <th class="px-2 py-2">พนักงาน</th>
                            <th class="px-2 py-2 text-right">ค่าที่วัด</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body"></tbody>
                </table>
            </div>
        </div>

        <!-- ส่วน Dashboard Overview -->
        <div class="lg:col-span-2 space-y-6">
            
            <div class="flex items-center justify-between border-b pb-2">
                <h2 class="text-xl font-bold text-gray-800">ภาพรวมคุณภาพ (Quality Overview)</h2>
                <span id="overview-part-title" class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-bold"></span>
            </div>

            <!-- KPI Cards ของพารามิเตอร์ที่ถูกเลือกปัจจุบัน -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                    <p class="text-sm text-gray-500">จำนวน (n)</p>
                    <p id="kpi-count" class="text-2xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                    <p class="text-sm text-gray-500">ค่าเฉลี่ย (Mean)</p>
                    <p id="kpi-mean" class="text-2xl font-bold text-gray-800">-</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm border text-center">
                    <p class="text-sm text-gray-500">Cp</p>
                    <p id="kpi-cp" class="text-2xl font-bold text-blue-600">-</p>
                </div>
                <div id="kpi-cpk-card" class="bg-white p-4 rounded-xl shadow-sm border text-center transition-colors">
                    <p class="text-sm text-gray-500">Cpk</p>
                    <p id="kpi-cpk" class="text-2xl font-bold text-gray-800">-</p>
                </div>
            </div>

            <!-- คอนเทนเนอร์สำหรับรองรับ "หลายกราฟ" -->
            <div id="charts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- กราฟแต่ละตัวจะถูกสร้างอัตโนมัติด้วย JavaScript ตรงนี้ -->
            </div>
            
        </div>
    </main>

    <!-- แก้ไขพาธชี้ไปที่โฟลเดอร์ js -->
    <script src="js/script.js"></script>
</body>
</html>
